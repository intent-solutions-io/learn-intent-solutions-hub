name: Deploy

# Merge to main -> pre-deploy gate (Node build + typecheck) -> Tailscale OIDC ->
# SSH to the intentsolutions VPS -> force-command /usr/local/sbin/deploy-learn-
# intentsolutions (git reset -> npm ci -> build -> migrate -> restart the
# learn-intentsolutions systemd service) -> Caddy serves public/ + reverse-proxies
# /api/* to the Node service on :8093 -> /api/health smoke check.
#
# A merge is a publish. Review is the gate: PRs are previewed and approved before
# merge, and only a merge to main triggers this deploy. Onboarded per the VPS
# repo-deploy runbook (static variant), reusing the existing learn-intentsolutions
# deploy key + force-command.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # required for Tailscale OIDC

concurrency:
  group: deploy-vps-${{ github.repository }}
  cancel-in-progress: false

jobs:
  test:
    name: pre-deploy gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install, build, typecheck
        run: |
          npm ci
          npm run build
          npm run typecheck
          test -f dist/server.node.js
          test -f public/index.html
          echo "node build + static hub present"

  deploy:
    needs: test
    uses: jeremylongshore/.github/.github/workflows/vps-deploy.yml@53d6be37d6c046818157b954acb33667ac095dd8
    with:
      # `variant` is informational only in the reusable workflow (the deploy step
      # just SSHes; the real build runs VPS-side in the force-command script).
      # This app is a systemd-native Node service, not docker or plain static.
      variant: static
      srv-path: /srv/learn-intentsolutions
      health-check-url: https://learn.intentsolutions.io/api/health
      vps-tailnet-ip: 100.88.144.55
      vps-public-ip: 167.86.106.29
      vps-host: intentsolutions
      vps-user: intentsolutions
      smoke-validation: '.ok == true'
    secrets:
      TS_OIDC_CLIENT_ID: ${{ secrets.TS_OIDC_CLIENT_ID }}
      TS_AUDIENCE: ${{ secrets.TS_AUDIENCE }}
      VPS_DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
      VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
