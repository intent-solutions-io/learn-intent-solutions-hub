<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ask a question · Intent Solutions Cohort</title>
<meta name="description" content="Send a question to the Intent Solutions cohort queue. Read and ranked; the most-asked get answered in the weekly update." />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/theme.css" />
<style>
  /* page-specific layout only — colors/tokens live in /theme.css */
  .wrap { max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; }
  h1 { font-size: 30px; }
  .lede { margin-top: 12px; font-size: 15.5px; color: var(--ink-dim); }
  .lede strong { color: var(--ink); font-weight: 600; }

  .lane-chip {
    display: none; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent);
    border: 1px solid var(--accent-line); border-radius: 999px;
    padding: 4px 12px; margin-top: 14px;
  }

  .card {
    margin-top: 30px; background: var(--bg-elevated); border: 1px solid var(--line);
    border-radius: 18px; padding: 32px 30px 30px; box-shadow: var(--shadow);
  }

  .field { margin-bottom: 22px; }
  label.lbl { display: block; font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
  label.lbl .opt { color: var(--ink-faint); font-weight: 400; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; margin-left: 6px; }

  /* no inset shadow — dark-on-dark inset reads as mud */
  .control, textarea, select {
    width: 100%; background: var(--bg-inset); color: var(--ink);
    border: 1px solid var(--line); border-radius: 11px;
    padding: 13px 14px; font-family: var(--font-ui); font-size: 15px;
    transition: border-color 160ms var(--ease), box-shadow 160ms var(--ease);
  }
  textarea { resize: vertical; min-height: 96px; line-height: 1.55; }
  .control::placeholder, textarea::placeholder { color: var(--ink-faint); }
  .control:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent-line-hi); box-shadow: var(--accent-ring);
  }
  .control:disabled { opacity: 0.45; cursor: not-allowed; }

  /* urgency segmented */
  .seg { display: flex; gap: 10px; }
  .seg label {
    flex: 1; position: relative; cursor: pointer;
    border: 1px solid var(--line); border-radius: 11px; padding: 12px 14px;
    font-size: 14px; color: var(--ink-dim); text-align: center;
    transition: border-color 160ms var(--ease), color 160ms var(--ease), background 160ms var(--ease);
  }
  .seg input { position: absolute; opacity: 0; pointer-events: none; }
  .seg label:hover { border-color: var(--accent-line); }
  .seg input:checked + span { color: var(--ink); }
  .seg label:has(input:checked) { border-color: var(--accent); background: var(--accent-wash); color: var(--ink); }
  .seg label:has(input:focus-visible) { box-shadow: var(--accent-ring); }

  /* anonymous checkbox */
  .check { display: flex; align-items: center; gap: 10px; margin-top: 12px; cursor: pointer; font-size: 13.5px; color: var(--ink-dim); }
  .check input { position: absolute; opacity: 0; }
  .check .box { width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--line); background: var(--bg-inset); display: grid; place-items: center; transition: all 140ms var(--ease); }
  .check .box svg { width: 12px; height: 12px; opacity: 0; transform: scale(0.6); transition: all 140ms var(--ease); color: var(--accent-ink); }
  .check input:checked + .box { background: var(--accent); border-color: var(--accent); }
  .check input:checked + .box svg { opacity: 1; transform: scale(1); }
  .check input:focus-visible + .box { box-shadow: var(--accent-ring); }

  .err { color: var(--clay); font-size: 12.5px; margin-top: 7px; display: none; }
  .field.invalid .err { display: block; }
  .field.invalid textarea, .field.invalid .control { border-color: var(--clay-line); }

  /* .submit inherits the orange CTA treatment from theme.css */
  .submit {
    width: 100%; margin-top: 6px;
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 15px; border-radius: 12px; padding: 15px;
  }
  .submit svg { width: 16px; height: 16px; }
  .foot-note { margin-top: 16px; font-size: 12.5px; color: var(--ink-faint); text-align: center; }

  /* success */
  .done { display: none; text-align: center; padding: 20px 10px 10px; }
  .done.show { display: block; }
  .card.hide { display: none; }
  .done .ring { width: 56px; height: 56px; border-radius: 999px; background: var(--positive-wash); display: grid; place-items: center; margin: 0 auto 18px; }
  .done .ring svg { width: 26px; height: 26px; color: var(--positive); }
  .done h2 { font-size: 22px; margin-bottom: 10px; }
  .done p { color: var(--ink-dim); font-size: 15px; max-width: 420px; margin: 0 auto; }
  .done .again { margin-top: 22px; display: inline-block; font-size: 14px; color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-line); cursor: pointer; }
  .done .again:hover { color: var(--accent-bright); }

  @media (max-width: 520px) {
    .wrap { padding: 32px 16px 60px; }
    .card { padding: 26px 20px; }
    .seg { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="header-glow" aria-hidden="true"></div>
  <a class="brand" href="/">
    <span class="logo-badge" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="5" cy="19" r="2" fill="var(--bg)"/>
        <circle cx="12" cy="12" r="2" fill="var(--bg)"/>
        <path d="M5 19 L12 12" stroke="var(--bg)" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 12 L19 5" stroke="var(--bg)" stroke-width="2" stroke-linecap="round"/>
        <path d="M13 5 H19 V11" stroke="var(--bg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="name">Intent Solutions <span class="sep">/</span> <span class="here">Ask</span></span>
  </a>
  <nav class="crumbs">
    <a href="/">Home</a>
    <a href="/#tracks">Tracks</a>
    <a href="/practice">Practice</a>
    <a href="/#tools">Tools</a>
  </nav>
</header>

<div class="wrap">

  <h1>Ask a question</h1>
  <div class="lane-chip" id="lane-chip"></div>

  <form class="card" id="ask-form" novalidate>
    <div class="field" id="f-question">
      <label class="lbl" for="question">Your question</label>
      <textarea id="question" name="question" placeholder=""></textarea>
      <div class="err">Add your question so we can answer it.</div>
    </div>

    <div class="field">
      <label class="lbl" for="context">Context <span class="opt">optional</span></label>
      <textarea id="context" name="context" placeholder=""></textarea>
    </div>

    <div class="field">
      <label class="lbl">How urgent is it?</label>
      <div class="seg">
        <label><input type="radio" name="urgency" value="blocking" /><span>I'm blocked right now</span></label>
        <label><input type="radio" name="urgency" value="general" checked /><span>General question</span></label>
      </div>
    </div>

    <div class="field" style="margin-bottom:24px">
      <label class="lbl" for="name">Name <span class="opt">optional</span></label>
      <input class="control" type="text" id="name" name="name" placeholder="" autocomplete="given-name" />
      <label class="check">
        <input type="checkbox" id="anon" />
        <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
        Post anonymously
      </label>
    </div>

    <button class="submit" type="submit">
      Send to the queue
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
    </button>
    <p class="foot-note">Answered by Friday.</p>
    <p id="send-err" style="display:none;color:var(--clay);font-size:12.5px;text-align:center;margin-top:12px">That didn't send. Check your connection and try again.</p>
  </form>

  <div class="done" id="done">
    <div class="ring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h2>In the queue.</h2>
    <a class="again" id="again">Ask another →</a>
  </div>

</div>

<footer class="foot">
  <span class="f-brand">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="5" cy="19" r="2" fill="currentColor"/>
      <circle cx="12" cy="12" r="2" fill="currentColor"/>
      <path d="M5 19 L12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M12 12 L19 5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <path d="M13 5 H19 V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span><b>Intent Solutions</b> · Cohort Learning Hub</span>
  </span>
  <span class="f-credit">Education arm · led by Max Sheahan</span>
</footer>

<script>
(function () {
  "use strict";
  var form = document.getElementById("ask-form");
  var done = document.getElementById("done");
  var laneChip = document.getElementById("lane-chip");
  var anon = document.getElementById("anon");
  var nameInput = document.getElementById("name");
  var qField = document.getElementById("f-question");
  var qInput = document.getElementById("question");

  // the lane rides in from the tile the member clicked (?lane=exam|tools|project|logistics)
  var map = { exam: "The exam", tools: "Tools & how-to", project: "My project", logistics: "Program & logistics" };
  var currentLane = "Program & logistics"; // default if someone lands on /ask directly
  try {
    var p = new URLSearchParams(window.location.search).get("lane");
    if (p && map[p]) {
      currentLane = map[p];
      laneChip.textContent = currentLane;
      laneChip.style.display = "inline-block";
    }
  } catch (e) {}

  // anonymous toggles the name field
  anon.addEventListener("change", function () {
    nameInput.disabled = anon.checked;
    if (anon.checked) nameInput.value = "";
  });

  qInput.addEventListener("input", function () { qField.classList.remove("invalid"); });

  var submitBtn = form.querySelector(".submit");
  var sendErr = document.getElementById("send-err");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    if (!qInput.value.trim()) {
      qField.classList.add("invalid");
      qInput.focus();
      return;
    }
    sendErr.style.display = "none";

    var checked = form.querySelector('input[name="urgency"]:checked');
    var payload = {
      lane: currentLane,
      question: qInput.value.trim(),
      context: document.getElementById("context").value.trim(),
      urgency: checked ? checked.value : "general",
      name: anon.checked ? "" : nameInput.value.trim(),
      anonymous: anon.checked
    };

    var restore = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.style.opacity = "0.65";
    submitBtn.textContent = "Sending…";

    try {
      var res = await fetch("/api/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error("status " + res.status);
      form.classList.add("hide");
      done.classList.add("show");
      window.scrollTo({ top: 0, behavior: "smooth" });
    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.style.opacity = "";
      submitBtn.innerHTML = restore;
      sendErr.style.display = "block";
    }
  });

  document.getElementById("again").addEventListener("click", function () {
    form.reset();
    nameInput.disabled = false;
    done.classList.remove("show");
    form.classList.remove("hide");
  });
})();
</script>
</body>
</html>
